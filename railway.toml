# Railway deployment — Alpha Hive AI backend
# Docs: https://docs.railway.app/reference/config-as-code
#
# Deploy via CLI:
#   npm install -g @railway/cli
#   railway login
#   railway init
#   railway up
#
# Ou conecte o repositório GitHub direto no painel do Railway.

[build]
builder = "nixpacks"

[deploy]
startCommand = "gunicorn --workers 1 --threads 2 --bind 0.0.0.0:$PORT --timeout 180 --keep-alive 5 --max-requests 200 --max-requests-jitter 20 app:app"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
