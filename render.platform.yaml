services:
  - type: web
    name: alpha-hive-platform-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -k gthread --threads 4 -b 0.0.0.0:$PORT api.server:app
    healthCheckPath: /api/v1/system/health
    autoDeploy: true
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://alpha-hive-platform-ui.onrender.com
      - key: BINANCE_FUTURES_TESTNET
        value: 1
      - key: BINANCE_FUTURES_EXECUTION_MODE
        value: paper
      - key: BINANCE_FUTURES_AUTO_EXECUTION
        value: 0
      - key: ALPHA_HIVE_LOG_LEVEL
        value: INFO
      - key: ALPHA_HIVE_DATABASE_URL
        sync: false
      - key: ALPHA_HIVE_DATA_DIR
        value: /var/data/alpha_hive
      - key: TWELVE_API_KEY_1
        sync: false
      - key: TWELVE_API_KEY_2
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: BINANCE_FUTURES_API_KEY
        sync: false
      - key: BINANCE_FUTURES_API_SECRET
        sync: false
    disk:
      name: alpha-hive-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: alpha-hive-platform-ui
    env: node
    rootDir: ui
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://alpha-hive-platform-api.onrender.com
